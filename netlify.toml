[build]
  base    = "."
  command = "pnpm --filter ./app build"
  publish = "app/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.4.0"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production]
  command = "pnpm --filter ./app build"

[context.deploy-preview]
  command = "pnpm --filter ./app build"

[context.branch-deploy]
  command = "pnpm --filter ./app build"

# Security response headers at the CDN layer. These MIRROR the
# `securityHeaders` set in app/next.config.ts (keep the two in exact sync).
# The Content-Security-Policy value below is byte-for-byte the string built by
# the `cspDirectives` array in app/next.config.ts (see that file for the
# per-directive rationale: why each connect-src/frame-src origin is present,
# and why script-src/style-src need 'unsafe-inline' absent a nonce pipeline).
# It is ENFORCING, not report-only. `upgrade-insecure-requests` is valid and
# silent in enforcing mode but logs a console error under report-only, which
# the e2e console-cleanliness check forbids.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://ethereum-rpc.publicnode.com wss://relay.walletconnect.com wss://relay.walletconnect.org https://relay.walletconnect.com https://relay.walletconnect.org https://api.web3modal.org https://pulse.walletconnect.org https://explorer-api.walletconnect.com https://verify.walletconnect.com https://verify.walletconnect.org https://cca-lite.coinbase.com https://chain-proxy.wallet.coinbase.com; frame-src 'self' https://verify.walletconnect.com https://verify.walletconnect.org https://*.coinbase.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
