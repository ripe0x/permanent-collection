<svg viewBox="0 0 520 292" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <!-- Self-contained (explicit colors, system mono stack, white background)
       so it renders identically inlined on the site and as an <img> on
       GitHub. Proportions are true to the deployed values: 6% skim
       (5% bid + 1% protocol, referral carved from protocol) + 0.5% LP. -->
  <rect x="0" y="0" width="520" height="292" fill="#FFFFFF"/>

  <!-- ── Bar 1: the whole 1 ETH, true scale ────────────────────────── -->
  <text x="20" y="28" font-size="14" fill="#111111">1 ETH of swap volume</text>
  <rect x="20" y="40" width="480" height="30" fill="#F4F4F4" stroke="#DADADA" stroke-width="1"/>
  <rect x="20" y="40" width="31.2" height="30" fill="#111111"/>
  <text x="60" y="59.5" font-size="12.5" fill="#6B6B6B">6.5% in fees · the rest trades as normal</text>

  <!-- zoom guides -->
  <line x1="20" y1="70" x2="20" y2="118" stroke="#6B6B6B" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="51.2" y1="70" x2="500" y2="118" stroke="#6B6B6B" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- ── Bar 2: the 6.5%, expanded ─────────────────────────────────
       widths on 480: bid 5.0/6.5 = 369.2 · LP 0.5/6.5 = 36.9 ·
       protocol 0.75/6.5 = 55.4 · referral 0.25/6.5 = 18.5 -->
  <rect x="20" y="118" width="369.2" height="42" fill="#111111"/>
  <rect x="389.2" y="118" width="36.9" height="42" fill="#F4F4F4" stroke="#DADADA" stroke-width="1"/>
  <rect x="426.1" y="118" width="55.4" height="42" fill="#6B6B6B"/>
  <rect x="481.5" y="118" width="18.5" height="42" fill="#9B9B9B"/>
  <text x="204" y="144.5" text-anchor="middle" font-size="15" fill="#FFFFFF">5.00% → the live bid</text>

  <!-- staggered ticks + labels -->
  <line x1="407.6" y1="160" x2="407.6" y2="182" stroke="#6B6B6B" stroke-width="0.8"/>
  <text x="407.6" y="198" text-anchor="middle" font-size="12.5" fill="#111111">0.50% LP fee</text>

  <line x1="463" y1="160" x2="463" y2="220" stroke="#6B6B6B" stroke-width="0.8"/>
  <text x="500" y="236" text-anchor="end" font-size="12.5" fill="#111111">1.00% protocol leg (≤0.25% referral)</text>

  <!-- caption -->
  <text x="20" y="270" font-size="12" fill="#6B6B6B">referral is carved from the protocol leg, never from the bid</text>
</svg>
